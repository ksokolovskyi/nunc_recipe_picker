name: nunc_recipe_picker
description: "nunc. Coffee Recipe Picker"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  path_drawing: ^1.0.1
  path_parsing: ^1.1.0
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/og-image.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
